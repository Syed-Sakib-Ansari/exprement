        let currentEpisodeDownloadUrl = "";
        const isSeriesPage = false;

        // 👑 🎯 FIXED: পেজ লোড হওয়া মাত্রই জাভাস্ক্রিপ্ট ডাইনামিকালি আইফ্রেম ইনজেক্ট করবে (ঠিক আগের সাইটের মতো)
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const container = document.getElementById('playerContainer');
                if (container) {
                    container.innerHTML = `<iframe id="videoIframe" class="w-full h-full border-0 outline-none rounded-lg bg-black" src="https://abyssplayer.com/gtOwgQfe7" frameborder="0" scrolling="no" marginwidth="0" marginheight="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share; fullscreen" allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true"></iframe>`;
                }
            }, 150); // ব্রাউজার ফিল্টার বাইপাস করার জন্য ছোট ডাইনামিক ডিলে
        });

        function copyWebsiteLink(btn) {
            const currentUrl = window.location.href; 
            navigator.clipboard.writeText(currentUrl).then(() => {
                const prevHtml = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check text-green-500"></i> Copied!';
                setTimeout(() => { btn.innerHTML = prevHtml; }, 2000);
            });
        }

        function playEpisode(url, idx, btn, epDownloadUrl) {
            const playerContainer = document.getElementById('playerContainer');
            if (playerContainer) {
                playerContainer.innerHTML = `<iframe id="videoIframe" class="w-full h-full border-0 outline-none rounded-lg bg-black" src="${url}" frameborder="0" scrolling="no" marginwidth="0" marginheight="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share; fullscreen" allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true"></iframe>`;
            }
            document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            clickCount = 0; 
            const downloadBtn = document.getElementById('mainDownloadBtn');
            downloadBtn.className = "relative overflow-hidden bg-gradient-to-r from-[#2B2727] to-[#2B2727] border border-[#E3DADA] text-white px-10 py-4 rounded-full font-black text-xs md:text-sm uppercase tracking-widest transition transform hover:scale-105 shadow-xl shadow-red-600/20 flex items-center gap-2 cursor-pointer";
            document.getElementById('downloadBtnText').innerText = "Download Episode " + (idx + 1);
            currentEpisodeDownloadUrl = epDownloadUrl || "";
        }

        function handleDownloadClick() {
            if (clickCount >= 3) return;
            clickCount++;
            
            if (clickCount === 1) {
                document.getElementById('downloadBtnText').innerText = "Ready For Download";
                if (dl1) window.open(dl1, '_blank');
            } else if (clickCount === 2) {
                document.getElementById('downloadBtnText').innerText = "Download (Final Click)";
                if (dl1) window.open(dl1, '_blank');
            } else if (clickCount === 3) {
                document.getElementById('downloadBtnText').innerText = "Link Expired";
                const btn = document.getElementById('mainDownloadBtn');
                btn.className = "bg-gray-900 border border-white/10 text-gray-500 px-10 py-4 rounded-full font-black text-xs md:text-sm uppercase tracking-widest flex items-center gap-2 cursor-not-allowed opacity-60";
                
                if (isSeriesPage && currentEpisodeDownloadUrl && currentEpisodeDownloadUrl.trim() !== "") {
                    window.open(currentEpisodeDownloadUrl, '_blank');
                } else if (dl2 && dl2.trim() !== "") {
                    window.open(dl2, '_blank');
                }
            }
        }
