<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | MOVIE DAKHI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .accent-text { color: #E50914; }
        .accent-bg { background-color: #E50914; }
        
        .big-email {
            font-size: clamp(1.5rem, 5vw, 4rem);
            word-break: break-all;
        }

        .social-btn {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .social-btn:hover {
            transform: translateY(-8px);
            color: white;
            border-color: transparent;
        }

        /* Original Brand Hover Colors */
        .fb-hover:hover { 
            background-color: #1877F2; 
            box-shadow: 0 10px 25px rgba(24, 119, 242, 0.4);
        }
        .yt-hover:hover { 
            background-color: #FF0000; 
            box-shadow: 0 10px 25px rgba(255, 0, 0, 0.4);
        }
        .ig-hover:hover { 
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); 
            box-shadow: 0 10px 25px rgba(220, 39, 67, 0.4);
        }
        .tg-hover:hover { 
            background-color: #26A5E4; 
            box-shadow: 0 10px 25px rgba(38, 165, 228, 0.4);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Top Navigation -->
    <nav class="sticky top-0 w-full z-50 bg-[#050505]/80 backdrop-blur-lg border-b border-white/5 px-6 py-4 flex justify-between items-center">
        <a href="index.html" class="text-2xl font-black tracking-tighter accent-text uppercase hover:scale-105 transition-transform">
            MOVIE DAKHI
        </a>
        <a href="index.html" class="accent-bg text-white px-6 py-2 rounded-full font-bold text-sm hover:opacity-80 transition flex items-center gap-2">
            <i class="fas fa-home"></i> Back to Home
        </a>
    </nav>

    <!-- Content Area -->
    <main class="flex-grow flex items-center justify-center container mx-auto px-6 py-12">
        <div class="glass-card w-full max-w-4xl p-10 md:p-20 rounded-[40px] text-center space-y-12">
            
            <div class="space-y-4">
                <h1 class="text-xl font-bold uppercase tracking-[0.3em] text-gray-500">Get in touch</h1>
                <p class="text-gray-400 text-lg">Have a request or found an issue? Reach out directly.</p>
            </div>

            <!-- Big Email Display (Select-all enabled) -->
            <div class="py-6">
                <p class="text-xs font-black uppercase tracking-widest text-red-600 mb-2">Our Direct Email</p>
                <div class="big-email font-black tracking-tighter cursor-text select-all selection:bg-red-600 selection:text-white">
                    dmca@<span class="accent-text">moviedakhi</span>.com
                </div>
            </div>

            <!-- Social Media Icons Section -->
            <div class="pt-8">
                <p class="text-xs font-black uppercase tracking-widest text-gray-500 mb-8">Follow us on Social Media</p>
                <div class="flex flex-wrap justify-center gap-6 md:gap-8">
                    <a href="https://www.facebook.com/profile.php?id=61586165302830" target="_blank" class="social-btn fb-hover w-16 h-16 md:w-20 md:h-20 rounded-3xl bg-white/5 flex items-center justify-center text-2xl md:text-3xl border border-white/10" title="Facebook">
                        <i class="fab fa-facebook-f"></i>
                    </a>
                    <a href="https://www.youtube.com/channel/UCNvWpk7H6y2u5886eCdv11w" target="_blank" class="social-btn yt-hover w-16 h-16 md:w-20 md:h-20 rounded-3xl bg-white/5 flex items-center justify-center text-2xl md:text-3xl border border-white/10" title="YouTube">
                        <i class="fab fa-youtube"></i>
                    </a>
                    <a href="https://www.instagram.com/moviedakhi/" target="_blank" class="social-btn ig-hover w-16 h-16 md:w-20 md:h-20 rounded-3xl bg-white/5 flex items-center justify-center text-2xl md:text-3xl border border-white/10" title="Instagram">
                        <i class="fab fa-instagram"></i>
                    </a>
                    <a href="https://t.me/+G2Dx_dMBlTkzMTM1" target="_blank" class="social-btn tg-hover w-16 h-16 md:w-20 md:h-20 rounded-3xl bg-white/5 flex items-center justify-center text-2xl md:text-3xl border border-white/10" title="Telegram">
                        <i class="fab fa-telegram-plane"></i>
                    </a>
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <footer class="w-full bg-[#0a0a0a] border-t border-white/5 px-6 py-12 flex flex-col items-center gap-6">
        <a href="index.html" class="text-3xl font-black tracking-tighter accent-text uppercase hover:scale-105 transition-transform">
            MOVIE DAKHI
        </a>
        <p class="text-gray-500 text-sm">Need a movie? We are always listening to your requests.</p>
        <a href="index.html" class="accent-bg text-white px-10 py-4 rounded-full font-black uppercase tracking-widest hover:opacity-80 transition flex items-center gap-3 shadow-xl shadow-red-600/20">
            <i class="fas fa-play"></i> Start Streaming
        </a>
        <div class="mt-8 text-gray-600 text-[10px] uppercase tracking-widest">
            &copy; 2026 MOVIE DAKHI. All Rights Reserved.
        </div>
    </footer>

</body>
</html>
