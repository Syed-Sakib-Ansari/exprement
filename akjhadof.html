<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --bg-main: #0f0f0f;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --accent: #E50914; 
            --accent-hover: #b80710;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Navbar */
        .navbar {
            padding: 20px 5%;
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-logo {
            font-size: 24px;
            font-weight: 900;
            color: var(--accent);
            text-transform: uppercase;
            text-decoration: none;
            letter-spacing: -1px;
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 5%;
        }

        /* Movie Details Section */
        .movie-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .movie-title {
            font-size: 2.5rem;
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .badges {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .badge {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .badge.quality { background: var(--accent); }

        .movie-description {
            color: var(--text-muted);
            max-width: 800px;
            margin: 0 auto;
            font-size: 1rem;
        }

        /* Video Player Area - Directly loading the iframe */
        .player-wrapper {
            background: #000;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto 40px auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            position: relative;
            aspect-ratio: 16 / 9; /* Ensures responsive video ratio */
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* The actual iframe - Always visible now */
        #videoIframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block; 
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 50px;
        }

        .btn-download {
            background: #2B2727;
            border: 1px solid #E3DADA;
            color: white;
            padding: 12px 30px;
            border-radius: 6px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-download:hover {
            transform: translateY(-2px);
            background: #333;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .movie-title { font-size: 1.8rem; }
            .action-buttons { flex-direction: column; padding: 0 20px; }
            .btn-download { justify-content: center; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="" class="navbar-logo">Movie&nbsp;&nbsp;Dakhi</a>
        <a href="" style="color: var(--text-muted); text-decoration: none; font-weight: 600; font-size: 14px;"><i class="fas fa-home"></i> Back to Home</a>
    </nav>

    <main class="container">
        
        <div class="movie-header">
            <div class="badges">
                <span class="badge quality">HDTC</span>
                <span class="badge">Hindi</span>
                <span class="badge">2026</span>
                <span class="badge">Action, Thriller</span>
            </div>
            
            <h1 class="movie-title">Watch Obsess (2026) HD</h1>
            
            <p class="movie-description">
                Stream <strong>Obsess</strong> full movie online for free in high-definition. Enjoy seamless, fast streaming directly on your browser.
            </p>
        </div>

        <div class="player-wrapper">
            <iframe id="videoIframe" src="https://abyssplayer.com/1pKyXv5RT" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen" allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true"></iframe>
        </div>

        <div class="action-buttons">
            <a href="https://moviedakhi.4meplayer.com/#818js&dl=1" target="_blank" class="btn-download">
                <i class="fas fa-cloud-download-alt"></i> Download Movie (1080p)
            </a>
        </div>

    </main>

</body>
</html>
